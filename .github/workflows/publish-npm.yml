name: Publish to NPM registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_version:
        description: Release tag to publish, e.g. v0.1.1
        required: true
        type: string
      source_ref:
        description: Git ref to build and test, defaults to the tag version
        required: false
        type: string

env:
  TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && (inputs.source_ref || inputs.tag_version) || github.ref_name }}
  RELEASE_TAG_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_version || github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_REF }}
      - name: Add dev branch
        run: git show-ref --verify --quiet refs/heads/dev || git branch dev origin/dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_REF }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: 'pnpm'

      - name: Get version
        run: echo "TAG_VERSION=${RELEASE_TAG_VERSION}" >> $GITHUB_ENV

      - name: Get git head
        run: echo "GIT_HEAD=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Update npm
        run: npm install npm@11.6.1 -g

      - name: Build&publish
        run: sh ./scripts/publish.sh
        env:
          TAG_VERSION: ${{env.TAG_VERSION}}
          GIT_HEAD: ${{env.GIT_HEAD}}
          FORCE_COLOR: 2
          NODE_OPTIONS: --max-old-space-size=4096
